<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | TaskFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 32px;
  padding: 50px 40px;
  width: 90%;
  max-width: 450px;
  border: 1px solid rgba(255,255,255,0.1);
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo i {
  font-size: 64px;
  color: #38bdf8;
  margin-bottom: 15px;
}

.logo h1 {
  font-size: 28px;
  color: white;
}

.logo p {
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  margin-top: 8px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  font-weight: 500;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 15px;
  font-family: inherit;
  transition: all 0.3s;
}

.form-group input:focus {
  outline: none;
  background: rgba(255,255,255,0.15);
}

.form-group input::placeholder {
  color: rgba(255,255,255,0.4);
}

.btn-login {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #38bdf8, #3b82f6);
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 10px;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(56,189,248,0.3);
}

.demo-credentials {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 15px;
  margin-top: 25px;
  text-align: center;
}

.demo-credentials p {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  margin-bottom: 10px;
}

.demo-badge {
  display: inline-block;
  background: rgba(56,189,248,0.2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  color: #38bdf8;
  margin: 3px;
}

.error-message {
  background: rgba(239,68,68,0.2);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 20px;
  color: #ef4444;
  font-size: 13px;
  text-align: center;
  display: none;
}

.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #10b981;
  color: white;
  padding: 12px 24px;
  border-radius: 12px;
  z-index: 1100;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@media (max-width: 480px) {
  .login-container { padding: 30px 25px; margin: 20px; }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <i class="fas fa-rocket"></i>
    <h1>TaskFlow Pro</h1>
    <p>Enterprise Project Management</p>
  </div>

  <div id="errorMessage" class="error-message"></div>

  <form onsubmit="event.preventDefault(); login()">
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="email" value="admin@taskflow.com">
    </div>

    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" value="admin123">
    </div>

    <button type="submit" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>
  </form>

  <div class="demo-credentials">
    <p><i class="fas fa-info-circle"></i> Demo Credentials:</p>
    <span class="demo-badge">Admin: admin@taskflow.com / admin123</span>
    <span class="demo-badge">User: john@taskflow.com / user123</span>
    <span class="demo-badge">Manager: jane@taskflow.com / manager123</span>
  </div>
</div>

<script>
// Hardcoded users for demo (simulates database)
const DEMO_USERS = [
  { id: 1, name: "Admin User", email: "admin@taskflow.com", password: "admin123", role: "admin" },
  { id: 2, name: "John Doe", email: "john@taskflow.com", password: "user123", role: "manager" },
  { id: 3, name: "Jane Smith", email: "jane@taskflow.com", password: "manager123", role: "member" },
  { id: 4, name: "Mike Johnson", email: "mike@taskflow.com", password: "user123", role: "member" }
];

function showToast(message, isError = false) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.style.background = isError ? "#ef4444" : "#10b981";
  toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("errorMessage");
  
  errorDiv.style.display = "none";
  
  if (!email || !password) {
    errorDiv.innerHTML = "Please enter both email and password";
    errorDiv.style.display = "block";
    return;
  }
  
  // Find user
  const user = DEMO_USERS.find(u => u.email === email && u.password === password);
  
  if (user) {
    // Store user info in localStorage (simulates session/token)
    const session = {
      id: user.id,
      name: user.name,
      email: user.email,
      role: user.role,
      loggedIn: true,
      loginTime: new Date().toISOString()
    };
    localStorage.setItem("taskflow_session", JSON.stringify(session));
    
    showToast(`Welcome back, ${user.name}! Redirecting...`);
    
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);
  } else {
    errorDiv.innerHTML = "Invalid email or password. Please try again.";
    errorDiv.style.display = "block";
    showToast("Login failed! Invalid credentials", true);
  }
}

// Check if already logged in
const session = localStorage.getItem("taskflow_session");
if (session) {
  try {
    const user = JSON.parse(session);
    if (user.loggedIn) {
      window.location.href = "dashboard.html";
    }
  } catch(e) {}
}
</script>
</body>
</html>
